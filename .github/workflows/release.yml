name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Type check
        run: npm run typecheck

      - name: Package Chrome
        run: npm run package:chrome

      - name: Package Firefox
        run: npm run package:firefox

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            captcha-counter-chrome.zip
            captcha-counter-firefox.zip
